spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/microgrid?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}

jwt:
  secret: ${JWT_SECRET:microgrid-platform-secret-key-2024-must-be-at-least-256-bits-long}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

mqtt:
  enabled: true
  broker-url: ${MQTT_BROKER_URL:tcp://emqx:1883}
  client-id: microgrid-backend-docker
  username: ${MQTT_USERNAME:admin}
  password: ${MQTT_PASSWORD:admin}
  topic: microgrid/device/+/data
  qos: 1

simulator:
  enabled: true
