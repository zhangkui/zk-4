server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: microgrid-platform
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: jdbc:postgresql://localhost:5432/microgrid?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: MicrogridHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

jwt:
  secret: microgrid-platform-secret-key-2024-must-be-at-least-256-bits-long
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

mqtt:
  enabled: false
  broker-url: tcp://localhost:1883
  client-id: microgrid-backend
  username: admin
  password: admin
  topic: microgrid/device/+/data
  qos: 1

simulator:
  enabled: false

logging:
  level:
    root: INFO
    com.microgrid.platform: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
